name: OrangeHRM Selenium Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch:
    inputs:
      tags:
        description: 'Tags Behave a executer (employee, leave, timesheet, search)'
        required: false
        default: ''
      browser:
        description: 'Navigateur (chrome ou firefox)'
        required: false
        default: 'chrome'

jobs:
  test:
    name: Run Selenium Behave Tests - ${{ matrix.test_suite }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        test_suite: [employee, leave, timesheet, search]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installation des dependances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install chromedriver-binary-auto
        shell: pwsh

      - name: Mise a jour Chrome pour matcher ChromeDriver
        run: |
          $chromePath = "C:\Program Files\Google\Chrome\Application\chrome.exe"
          Write-Host "Version Chrome actuelle:"
          & $chromePath --version
          Write-Host "Version ChromeDriver installe:"
          chromedriver --version
          $chromeVersion = (& $chromePath --version) -replace "Google Chrome ", ""
          $driverVersion = (chromedriver --version) -replace "ChromeDriver ", "" -replace " .*", ""
          Write-Host "Chrome: $chromeVersion"
          Write-Host "Driver: $driverVersion"
          $chromeMajor = ($chromeVersion -split "\.")[0]
          $driverMajor = ($driverVersion -split "\.")[0]
          if ($chromeMajor -ne $driverMajor) {
            Write-Host "Versions differentes - mise a jour Chrome vers version compatible"
            $installerUrl = "https://storage.googleapis.com/chrome-for-testing-public/$driverVersion/win64/chrome-win64.zip"
            Write-Host "Tentative telechargement: $installerUrl"
          }
        shell: pwsh
        continue-on-error: true

      - name: Installation Chrome compatible via Selenium Manager
        run: |
          python -c "
          from selenium import webdriver
          from selenium.webdriver.chrome.service import Service
          import subprocess
          import os
          result = subprocess.run(['selenium-manager', '--browser', 'chrome', '--output', 'json'], capture_output=True, text=True)
          print(result.stdout)
          print(result.stderr)
          "
        shell: pwsh
        continue-on-error: true

      - name: Creation des dossiers de rapports
        run: |
          New-Item -ItemType Directory -Force -Path reports\screenshots
          New-Item -ItemType Directory -Force -Path reports\junit
        shell: pwsh

      - name: Execution des tests - ${{ matrix.test_suite }}
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          EMPLOYEE_USERNAME: ${{ secrets.EMPLOYEE_USERNAME }}
          EMPLOYEE_PASSWORD: ${{ secrets.EMPLOYEE_PASSWORD }}
          BROWSER: chrome
          HEADLESS: 'true'
          IMPLICIT_WAIT: '15'
          EXPLICIT_WAIT: '40'
          PYTHONUTF8: '1'
          PYTHONIOENCODING: 'utf-8'
          SE_AVOID_STATS: 'true'
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          if ("${{ github.event.inputs.tags }}" -ne "") {
            python -X utf8 -m behave --tags=${{ github.event.inputs.tags }} --junit --junit-directory=reports/junit -f pretty
          } else {
            python -X utf8 -m behave --tags=${{ matrix.test_suite }} --junit --junit-directory=reports/junit -f pretty
          }
        shell: pwsh
        continue-on-error: true

      - name: Upload des screenshots en cas d'echec
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.test_suite }}
          path: reports\screenshots\
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload des rapports JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-reports-${{ matrix.test_suite }}
          path: reports\junit\
          if-no-files-found: ignore
          retention-days: 14

  report:
    name: Rapport consolide
    runs-on: windows-latest
    needs: test
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Telechargement de tous les rapports JUnit
        uses: actions/download-artifact@v4
        with:
          pattern: junit-reports-*
          path: all-reports
          merge-multiple: true
        continue-on-error: true

      - name: Publication des resultats de tests
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: 'Resultats Tests Selenium Behave'
          path: 'all-reports/**/*.xml'
          reporter: java-junit
          fail-on-error: false
        continue-on-error: true